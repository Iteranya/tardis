{% extends "auth/index.html" %}

{% block title %}Login{% endblock %}
{% block subtitle %}Welcome back! Sign in to your account.{% endblock %}

{% block content %}
<div x-data="loginForm()">
    <!-- Error Message -->
    <div x-show="error" x-cloak
         class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm"
         x-text="error">
    </div>

    <!-- Success Message -->
    <div x-show="success" x-cloak
         class="mb-4 p-3 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm"
         x-text="success">
    </div>

    <form class="space-y-6"
          hx-post="/api/auth/login"
          hx-target="this"
          hx-swap="outerHTML"
          @submit.prevent="handleLogin($event)">

        <!-- Email -->
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700">
                Email address
            </label>
            <div class="mt-1">
                <input id="email"
                       name="email"
                       type="email"
                       autocomplete="email"
                       required
                       x-model="email"
                       class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none transition"
                       placeholder="you@example.com"
                       :class="{ 'border-red-300': fieldErrors.email }">
                <p x-show="fieldErrors.email" x-text="fieldErrors.email"
                   class="mt-1 text-xs text-red-600"></p>
            </div>
        </div>

        <!-- Password -->
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700">
                Password
            </label>
            <div class="mt-1 relative">
                <input id="password"
                       name="password"
                       :type="showPassword ? 'text' : 'password'"
                       autocomplete="current-password"
                       required
                       x-model="password"
                       class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-900 placeholder-gray-400 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none transition pr-10"
                       :class="{ 'border-red-300': fieldErrors.password }">
                <button type="button"
                        @click="showPassword = !showPassword"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                    <svg x-show="!showPassword" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                    <svg x-show="showPassword" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                    </svg>
                </button>
                <p x-show="fieldErrors.password" x-text="fieldErrors.password"
                   class="mt-1 text-xs text-red-600"></p>
            </div>
        </div>

        <!-- Remember Me -->
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <input id="remember"
                       name="remember"
                       type="checkbox"
                       x-model="remember"
                       class="h-4 w-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500">
                <label for="remember" class="ml-2 block text-sm text-gray-700">
                    Remember me
                </label>
            </div>
            <div class="text-sm">
                <a href="/auth/forgot-password"
                   class="font-medium text-primary-600 hover:text-primary-500">
                    Forgot password?
                </a>
            </div>
        </div>

        <!-- Submit -->
        <div>
            <button type="submit"
                    :disabled="loading"
                    class="w-full flex justify-center rounded-lg bg-primary-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition"
                    x-html="loading ? 'Signing in... ⏳' : 'Sign in'">
            </button>
        </div>
    </form>

    <!-- Divider -->
    <div class="mt-6">
        <div class="relative">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="bg-white px-2 text-gray-500">Don't have an account?</span>
            </div>
        </div>

        <div class="mt-4 text-center">
            <a href="/auth/register"
               class="font-medium text-primary-600 hover:text-primary-500">
                Create one now →
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/frontend/auth/login/login.js"></script>
{% endblock %}
