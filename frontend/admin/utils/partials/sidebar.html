<aside class="w-64 bg-white border-r border-gray-200 flex flex-col"
       :class="{ 'w-16': !sidebarOpen }">
    <!-- Logo -->
    <div class="h-16 flex items-center px-4 border-b border-gray-200">
        <img src="/static/images/logo-icon.svg" alt="Anita-CMS" class="h-8 w-8">
        <span x-show="sidebarOpen" class="ml-3 font-semibold text-gray-800">Anita-CMS</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto p-3 space-y-1">
        <a href="/admin/dashboard"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium transition"
           :class="activePage === 'dashboard' ? 'bg-primary-50 text-primary-700' : 'text-gray-600 hover:bg-gray-100'"
           x-data @click="activePage = 'dashboard'">
            <svg class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
            <span x-show="sidebarOpen" class="ml-3">Dashboard</span>
        </a>

        <a href="/admin/pages"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium transition"
           :class="activePage === 'pages' ? 'bg-primary-50 text-primary-700' : 'text-gray-600 hover:bg-gray-100'">
            <svg class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <span x-show="sidebarOpen" class="ml-3">Pages</span>
        </a>

        <a href="/admin/articles"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium transition"
           :class="activePage === 'articles' ? 'bg-primary-50 text-primary-700' : 'text-gray-600 hover:bg-gray-100'">
            <svg class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00"></path></svg>
            <span x-show="sidebarOpen" class="ml-3">Articles</span>
        </a>

        <a href="/admin/sites"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium transition"
           :class="activePage === 'sites' ? 'bg-primary-50 text-primary-700' : 'text-gray-600 hover:bg-gray-100'">
            <svg class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span x-show="sidebarOpen" class="ml-3">Sites</span>
        </a>

        <a href="/admin/collections"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium transition"
           :class="activePage === 'collections' ? 'bg-primary-50 text-primary-700' : 'text-gray-600 hover:bg-gray-100'">
            <svg class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            <span x-show="sidebarOpen" class="ml-3">Collections</span>
        </a>

        <a href="/admin/storage"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium transition"
           :class="activePage === 'storage' ? 'bg-primary-50 text-primary-700' : 'text-gray-600 hover:bg-gray-100'">
            <svg class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span x-show="sidebarOpen" class="ml-3">Storage</span>
        </a>

        <hr class="my-3 border-gray-200">

        <a href="/admin/users"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium transition"
           :class="activePage === 'users' ? 'bg-primary-50 text-primary-700' : 'text-gray-600 hover:bg-gray-100'">
            <svg class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <span x-show="sidebarOpen" class="ml-3">Users</span>
        </a>
    </nav>

    <!-- Sidebar toggle -->
    <div class="p-3 border-t border-gray-200">
        <button @click="sidebarOpen = !sidebarOpen" class="w-full text-gray-500 hover:text-gray-700">
            <svg class="h-5 w-5 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
        </button>
    </div>
</aside>
