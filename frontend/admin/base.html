<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anita-CMS — {% block title %}Admin{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            300: '#f9a8d4',
                            400: '#f472b6',
                            500: '#ec4899',
                            600: '#db2777',
                            700: '#be185d',
                            800: '#9d174d',
                            900: '#831843',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.0/dist/cdn.min.js"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>

    <!-- Admin CSS -->
    <link rel="stylesheet" href="/frontend/admin/main.css">
    {% block head %}{% endblock %}
</head>
<body class="h-full" x-data="adminApp()" x-init="init()">
    <!-- Loading overlay -->
    <div x-show="loading" class="fixed inset-0 z-50 flex items-center justify-center bg-black/30">
        <div class="bg-white p-6 rounded-xl shadow-xl flex items-center gap-3">
            <svg class="animate-spin h-6 w-6 text-primary-600" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-sm text-gray-600" x-text="loadingMessage">Loading...</span>
        </div>
    </div>

    <!-- Unauthorized message -->
    <div x-show="!authenticated" class="fixed inset-0 z-50 flex items-center justify-center bg-white">
        <div class="text-center">
            <p class="text-red-600 text-lg font-semibold">Unauthorized</p>
            <p class="text-gray-500">You need to be logged in as superuser.</p>
            <a href="/auth/login" class="mt-4 inline-block text-primary-600 hover:underline">Go to Login</a>
        </div>
    </div>

    <!-- Admin app (hidden if not authenticated) -->
    <div x-show="authenticated" class="flex h-full">
        <!-- Sidebar -->
        {% include "admin/utils/partials/sidebar.html" %}

        <!-- Main area -->
        <div class="flex-1 flex flex-col min-w-0">
            <!-- Top bar -->
            {% include "admin/utils/partials/topbar.html" %}

            <!-- Page content -->
            <main class="flex-1 overflow-auto p-6">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    {% block scripts %}{% endblock %}
    <script src="/frontend/admin/main.js"></script>
</body>
</html>
