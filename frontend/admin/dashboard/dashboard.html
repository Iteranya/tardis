{% extends "admin/base.html" %}

{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="space-y-6">
    <div class="bg-white p-6 rounded-xl shadow-sm">
        <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
        <p class="text-gray-500 mt-2">Welcome to Anita-CMS! This is your central command center.</p>
    </div>

    <!-- Quick stats cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-primary-500">
            <p class="text-sm text-gray-500">Pages</p>
            <p class="text-2xl font-bold text-gray-900">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
            <p class="text-sm text-gray-500">Articles</p>
            <p class="text-2xl font-bold text-gray-900">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500">
            <p class="text-sm text-gray-500">Sites</p>
            <p class="text-2xl font-bold text-gray-900">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-500">
            <p class="text-sm text-gray-500">Storage</p>
            <p class="text-2xl font-bold text-gray-900">0</p>
        </div>
    </div>

    <!-- Placeholder sections -->
    <div class="bg-white p-6 rounded-xl shadow-sm">
        <h2 class="text-lg font-semibold text-gray-800">Recent Activity</h2>
        <p class="text-gray-400 mt-4 text-sm">Activity feed coming soon...</p>
    </div>
</div>
{% endblock %}
